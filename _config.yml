# Hexo Configuration
# Docs: https://hexo.io/docs/configuration.html

# Site
title: Yunqi Meng
subtitle: ''
description: 记录学习与生活的个人博客
keywords: 技术,编程,博客,Hexo
author: 孟俊澎
language: zh-CN
timezone: ''

# URL
url: https://yunqi-meng.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude
include:
exclude:
ignore:

# Extensions
theme: butterfly

# Deployment (disabled - using GitHub Actions)
# deploy:
#   type: git
#   repo: https://github.com/yunqi-meng/yunqi-meng.github.io.git
#   branch: gh-pages
#   message: "Site updated: {{ now('YYYY-MM-DD HH:mm:ss') }}"

# Admin
admin:
  username: admin
  password_hash: $2a$10$6pWX3IoOf63QDZyFrs279OcwifK6JvLk12IhBfX0VCVzwOTUBFCnO
  secret: hexoadminsecretkey123456
  deployCommand: ''
  port: 4000
  expire: 60

# Search
search:
  path: search.xml
  field: post
  format: html
  limit: 10000

# Sitemap
sitemap:
  path: sitemap.xml
  rel: false
  tags: true
  categories: true

# Robots
robotstxt:
  useragent: "*"
  allow:
    - /
  disallow:
    - /admin/
    - /js/
    - /css/
  sitemap: /sitemap.xml

# Lazyload
lazyload:
  enable: true
  onlypost: false
  loadingImg: /images/loading.gif

# Feed
feed:
  type:
    - atom
    - rss2
  path:
    - atom.xml
    - rss2.xml
  limit: 20
  hub:
  content:
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date
  icon: icon.png
  autodiscovery: true
  template:

# Markdown 渲染配置
marked:
  prependRoot: true
  postAsset: true

# HTML/CSS/JS 压缩
neat_enable: true
neat_html:
  enable: true
  exclude:
neat_css:
  enable: true
  exclude:
    - '*.min.css'
neat_js:
  enable: true
  mangle: true
  output:
  compress:
  exclude:
    - '*.min.js'
