  post:

# --------------------------------------
# Verification
# --------------------------------------
site_verification:

# --------------------------------------
# Beautify / Effect
# --------------------------------------
theme_color:
  enable: true
  main: "#2563eb"
  paginator: "#2563eb"
  button_hover: "#3b82f6"
  text_selection: "#2563eb"
  link_color: "#2563eb"
  meta_color: "#64748b"
  hr_color: "#e2e8f0"
  code_foreground: "#2563eb"
