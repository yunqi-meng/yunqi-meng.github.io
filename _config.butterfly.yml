# Butterfly Theme Configuration - Modern Minimalist Style
# Version: 5.5.4

# --------------------------------------
# Navigation Settings
# --------------------------------------
nav:
  logo: /images/avatar.jpg
  display_title: true
  display_post_title: true
  fixed: true

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  关于: /about/ || fas fa-user

# --------------------------------------
# Code Blocks Settings
# --------------------------------------
code_blocks:
  theme: darker
  macStyle: true
  height_limit: 400
  word_wrap: true
  copy: true
  language: true
  shrink: true
  fullpage: false

# Social media links
social:
  fab fa-github: https://github.com/yunqi-meng || Github || '#24292e'
  fab fa-twitter: https://twitter.com/yunqi_meng || Twitter || '#1da1f2'
  fab fa-zhihu: https://www.zhihu.com/people/yunqi-meng || 知乎 || '#0084ff'
  fas fa-envelope: mailto:yunqi.meng@example.com || 邮箱 || '#ea4335'
  fas fa-rss: /atom.xml || RSS || '#f8981d'

# --------------------------------------
# Image Settings
# --------------------------------------
favicon: /img/favicon.ico

avatar:
  img: /images/avatar.jpg
  effect: false

disable_top_img: false
default_top_img: /images/default.jpg
index_img: /images/default.jpg
archive_img: /images/default.jpg
tag_img: /images/default.jpg
category_img: /images/default.jpg

footer_img: false
background:

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:
    - /images/default.jpg

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

error_404:
  enable: true
  subtitle: '页面未找到'
  background: /img/error-page.png

post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# --------------------------------------
# Index page settings
# --------------------------------------
subtitle:
  enable: true
  effect: true
  typed_option:
    typeSpeed: 100
    backSpeed: 50
    backDelay: 1000
    loop: true
    smartBackspace: true
  source: false
  sub:
    - 记录技术成长与生活点滴
    - 分享编程心得与学习笔记
    - 探索技术的无限可能

index_layout: 2

index_post_content:
  method: 3
  length: 180

# --------------------------------------
# Post Settings
# --------------------------------------
toc:
  post: true
  page: false
  number: false
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false
  text:
  QR_code:

post_edit:
  enable: false
  url:

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

noticeOutdate:
  enable: false
  style: flat
  limit_day: 365
  position: top
  message_prev: 距离上次更新已过去
  message_next: 天，文章内容可能已过时。

# --------------------------------------
# Footer Settings
# --------------------------------------
footer:
  nav:
  owner:
    enable: true
    since: 2024
  copyright:
    enable: true
    version: true
  custom_text:

# --------------------------------------
# Aside Settings
# --------------------------------------
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 热爱技术，专注开发
    button:
      enable: true
      icon: fab fa-github
      text: 关注我
      link: https://github.com/yunqi-meng
    sort_order: 1
  card_announcement:
    enable: true
    content: 欢迎来到我的博客！<br>这里记录我的技术成长与生活点滴。
    sort_order: 2
  card_recent_post:
    enable: true
    limit: 6
    sort: updated
    sort_order: 3
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order: 4
  card_tags:
    enable: true
    limit: 20
    color: true
    custom_colors:
    orderby: random
    order: 1
    sort_order: 5
  card_archives:
    enable: true
    type: monthly
    format: YYYY年MM月
    order: -1
    limit: 8
    sort_order: 6
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order: 7
    runtime_date: 2024/01/01 00:00:00
  card_newest_comments:
    enable: false
    sort_order:
    limit: 6
    storage: 10
    avatar: true
  card_post_series:
    enable: false
    series_title: false
    orderBy: 'date'
    order: -1

# --------------------------------------
# Bottom right button
# --------------------------------------
rightside_bottom:

translate:
  enable: false
  default: 繁
  defaultEncoding: 2
  translateDelay: 0
  msgToTraditionalChinese: '繁'
  msgToSimplifiedChinese: '簡'

readmode: true

darkmode:
  enable: true
  button: true
  autoChangeMode: false
  start:
  end:

rightside_scroll_percent: true

rightside_item_order:
  enable: false
  hide:
  show:

rightside_config_animation: true

# --------------------------------------
# Global Settings
# --------------------------------------
anchor:
  auto_update: true
  click_to_scroll: true

photofigcaption: false

copy:
  enable: true
  copyright:
    enable: false
    limit_count: 150

wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# Math - LaTeX Formula Support
# --------------------------------------
math:
  use: mathjax
  per_page: true
  hide_scrollbar: false

  mathjax:
    enableMenu: true
    tags: none

  katex:
    copy_tex: false

# --------------------------------------
# Search
# --------------------------------------
search:
  use: local_search
  placeholder: 搜索...

  algolia_search:
    hitsPerPage: 6

  local_search:
    preload: true
    top_n_per_article: 1
    unescape: false
    pagination:
      enable: false
      hitsPerPage: 8
    CDN:

  docsearch:
    appId:
    apiKey:
    indexName:
    option:

# --------------------------------------
# Share System
# --------------------------------------
share:
  use:

  sharejs:
    sites: wechat,weibo,qq

  addtoany:
    item: wechat,sina_weibo,email,copy_link

# --------------------------------------
# Comments System - All Disabled
# --------------------------------------
comments:
  use:
  text: false
  lazyload: false
  count: false
  card_post_count: false

disqus:
  shortname:
  apikey:

disqusjs:
  shortname:
  apikey:
  option:

