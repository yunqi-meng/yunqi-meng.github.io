# --------------------------------------
# Lightbox Settings
# --------------------------------------
lightbox: fancybox

# --------------------------------------
# Tag Plugins settings
# --------------------------------------
series:
  enable: false
  orderBy: 'title'
  order: 1
  number: true

abcjs:
  enable: false
  per_page: true

mermaid:
  enable: false
  code_write: false
  theme:
    light: default
    dark: dark
  open_in_new_tab: true
  zoom_pan: true

chartjs:
  enable: false
  fontColor:
    light: 'rgba(0, 0, 0, 0.8)'
    dark: 'rgba(255, 255, 255, 0.8)'
  borderColor:
    light: 'rgba(0, 0, 0, 0.1)'
    dark: 'rgba(255, 255, 255, 0.2)'
