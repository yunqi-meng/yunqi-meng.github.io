tidio:
  public_key:

crisp:
  website_id:

# --------------------------------------
# Analysis
# --------------------------------------
baidu_analytics:
google_analytics:
cloudflare_analytics:
microsoft_clarity:
umami_analytics:
  enable: false
  serverURL:
  script_name: script.js
  website_id:
  option:
  UV_PV:
    site_uv: false
    site_pv: false
    page_pv: false
    token:

google_tag_manager:
  tag_id:
  domain:

# --------------------------------------
# Advertisement
# --------------------------------------
google_adsense:
  enable: false
  auto_ads: true
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js
