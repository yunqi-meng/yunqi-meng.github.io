# Butterfly Theme Configuration - Heo Style
# Version: 5.5.4

# Avatar
avatar:
  img: /images/avatar.jpg
  effect: false

# Navigation
nav:
  logo: /images/avatar.jpg
  display_title: true
  fixed: true
  menu:
    首页: / || fas fa-home
    归档: /archives/ || fas fa-archive
    标签: /tags/ || fas fa-tags
    分类: /categories/ || fas fa-folder-open
    关于: /about/ || fas fa-user

# Header
index_img: /images/default.jpg
default_top_img: /images/default.jpg

# Post
index_post_content:
  method: 3
  length: 300

post_meta:
  date_type: created
  date_format: YYYY-MM-DD
  categories: true
  tags: true
  label: true

# TOC
toc:
  enable: true
  number: false
  expand_all: false
  init_open: true
  layout: right

# Copyright
post_copyright:
  enable: true
  decode: false
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# Related posts
related_post:
  enable: true
  limit: 6
  date_type: created

# Code blocks
highlight_theme: mac
highlight_copy: true
highlight_lang: true
highlight_height_limit: false
highlight_shrink: false
code_word_wrap: false

# Search
local_search:
  enable: true
  preload: false

# Comments (disabled)
comments:
  use:
  text: true
  lazyload: true
  count: false
  card_post_count: false

# Twikoo (configured but disabled)
twikoo:
  envId:
  region:
  option:
  visitor: false

# Lazyload
image_lazyload:
  enable: true
  field: site
  placeholder: /images/loading.gif

# Lightbox
fancybox: true

# Dark mode
darkmode:
  enable: true
  button: true
  autoChangeMode: 1
  startDark: '22:00'
  endDark: '06:00'

# Sidebar
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  card_author:
    enable: true
    description: 热爱技术，专注开发
    button:
      enable: true
      icon: fab fa-github
      text: 关注我
      link: https://github.com/yunqi-meng
  card_announcement:
    enable: true
    content: 欢迎来到我的博客！
  card_recent_post:
    enable: true
    limit: 5
    sort: updated
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 20
    color: true
    orderby: random
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    runtime: true

# Footer
footer:
  owner:
    enable: true
    since: 2024
  custom_text:
  copyright: true

# Inject custom CSS/JS
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
  bottom:
    - <script src="/js/main.js"></script>

# CDN
CDN:
  internal_provider: local
  third_party_provider: jsdelivr
