    light: 'transparent'
    dark: 'transparent'

note:
  style: flat
  icons: true
  border_radius: 8
  light_bg_offset: 0

# --------------------------------------
# Other Settings
# --------------------------------------
pjax:
  enable: false
  exclude:

aplayerInject:
  enable: false
  per_page: true

snackbar:
  enable: false
  position: bottom-left
  bg_light: '#5e60ce'
  bg_dark: '#1f1f1f'

instantpage: false

lazyload:
  enable: true
  native: true
  field: site
  placeholder: /images/loading.gif
  blur: false

pwa:
  enable: false
  manifest:
  apple_touch_icon:
  favicon_32_32:
  favicon_16_16:
  mask_icon:

Open_Graph_meta:
  enable: true
  option:

structured_data:
  enable: false
  alternate_name:

css_prefix: true

# --------------------------------------
# Inject Custom CSS/JS
# --------------------------------------
inject:
