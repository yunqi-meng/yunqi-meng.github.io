# Butterfly 主题配置文件

# 主题版本
version: 4.13.0

# 网站信息
site_meta:
  title: Hexo
  author: John Doe
  description: 记录学习与生活的个人博客
  keywords: 技术,编程,博客,Hexo

# 导航栏
nav:
  logo: /images/avatar.png
  display_title: true
  fixed: true
  menu:
    Home: / || fas fa-home
    Archives: /archives/ || fas fa-archive
    Tags: /tags/ || fas fa-tags
    Categories: /categories/ || fas fa-folder-open
    About: /about/ || fas fa-user

# 首页配置
index_img: /images/default.jpg
default_top_img: /images/default.jpg
index_site_info_top: 0px

# 首页文章配置
index_post_content:
  method: 3
  length: 500

# 文章页配置
post_meta:
  date_type: created
  categories: true
  tags: true
  label: true

# 文章页目录
toc:
  enable: true
  number: true
  expand_all: false
  init_open: true
  layout: right

# 文章页版权声明
post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 相关文章推荐
related_post:
  enable: true
  limit: 6
  date_type: created
  params:
    maxSize: 5
    minSimilarity: 0.5
    keywordsLimit: 50
    autoCover: true
    multiple: 3

# 代码块配置
highlight_theme: mac light
highlight_copy: true
highlight_lang: true
highlight_height_limit: false
highlight_shrink: false
code_word_wrap: false

# 搜索配置
local_search:
  enable: true
  preload: false
  CDN:

# 评论配置
comments:
  use: 
  text: true
  lazyload: true
  count: false
  card_post_count: false

# Twikoo 评论系统
twikoo:
  envId: https://twikoo.your-env-id.com
  region:
  option:
  visitor: true

# 图片配置
image_lazyload:
  enable: true
  field: site
  placeholder: /images/loading.gif

# 图片灯箱
fancybox: true

# 字体配置
font:
  enable: true
  font-family: 'PingFang SC, Microsoft YaHei, Inter, -apple-system, BlinkMacSystemFont, system-ui'
  font-size: 16px
  code-font-family: 'JetBrains Mono, Fira Code, Consolas, Monaco, monospace'

# 颜色配置
colors:
  primary: '#3b82f6'
  secondary: '#f97316'
  text: '#1f2937'
  background: '#fafafa'
  code_background: '#f5f5f5'

# 深色模式
darkmode:
  enable: true
  button: true
  autoChangeMode: 1
  startDark: '22:00'
  endDark: '06:00'
  darkmode_background: '#111827'
  darkmode_text: '#e5e7eb'

# 首页布局
index_layout:
  type: 3
  category:
    enable: true
    limit: 3
    icon: fas fa-folder-open
  tag:
    enable: true
    limit: 3
    icon: fas fa-tags

# 个人信息卡片
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  card_author:
    enable: true
    description: 
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/yunqi-meng
  card_announcement:
    enable: true
    content: 欢迎来到我的博客！
  card_recent_post:
    enable: true
    limit: 5
    sort: updated
    sort_order: 
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order: 
  card_tags:
    enable: true
    limit: 10
    color: false
    orderby: random
    order: 1
    count: 20
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    runtime: true
    sort_order: false

# 底部配置
footer:
  owner:
    enable: true
    since: 2024
    copyright: John Doe
  custom_text:
  copyright: true
  ICP: 
  CDN: 

# 骨架屏
skeleton:
  enable: true
  image: /images/skeleton.gif

# 加载动画
loading:
  full_page: false
  pace: true

# 侧边栏设置
sidebar:
  display: always
  offset: 12
  b2t: true
  scrollpercent: true
  onmobile: true

# 运行时间
runtimeshow:
  enable: true
  publish_date: 2024/01/01 00:00:00
  page_unit: 天
  site_unit: 天
  stop_time: 

# 字数统计
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# 阅读时长
readmode: true

# 阅读进度
reading_progress:
  enable: true
  start_left: true
  height: 3px
  color: '#3b82f6'
  position: top

# 复制配置
copy:
  enable: true
  copyright:
    enable: true
    limit_count: 50

# 分享配置
sharejs:
  enable: false

# 更多推荐
recommends:
  enable: false

# 广告
ad:
  index:
    enable: false
    limit: 3
    site_ads:
  post:
    enable: false
    limit: 3
    site_ads:
  aside:
    enable: false
    limit: 3
    site_ads:

# 验证
verification:
  google: 
  baidu: 
  bing: 

# 数学公式
mathjax:
  enable: false
  per_page: false
  mathjax:
    tex:
      inlineMath: 
        - ['$', '$']
        - ['\\(', '\\)']
      displayMath:
        - ['$$', '$$']
        - ['\\[', '\\]']
      tags: 'ams'
      options:
        skipTags:
          - 'script'
          - 'noscript'
          - 'style'
          - 'textarea'
          - 'pre'
        include:
          - 'head'
          - 'body'
    options:
      renderActions:
        - find
        - findMathML
      menuItems:
        - contextMenu
        - zoom
        - toggle
    katex:
      css:
        js:
        config:
          macros:
  katex:
    enable: false
    per_page: false
    copy_tex: true

# Mermaid
mermaid:
  enable: false
  theme: 

# CDN
CDN:
  css:
    - /css/custom.css
  js:
    - /js/main.js

# PWA
pwa:
  enable: false
  manifest: /manifest.json
  apple_touch_icon: /img/pwa/apple-touch-icon.png
  favicon_32_32: /img/pwa/32.png
  favicon_16_16: /img/pwa/16.png
  mask_icon: /img/pwa/safari-pinned-tab.svg

# Open Graph
open_graph:
  enable: true
  meta_img: /images/default.jpg
  twitter_card: summary_large_image
  google_plus: 
  fb_admin_id: 
  fb_app_id: 

# RSS
rss:
  atom: /atom.xml
  rss2: /rss2.xml

# 移动端适配
mobile:
  layout: simple
  meta: true

# 性能优化
performance:
  enable: true
  prefetch: true
  preconnect: true

# 安全
security:
  enable: true
  csp:
    enable: false
    policies: 
